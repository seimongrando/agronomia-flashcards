<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Deck &mdash; Agronomia Flashcards</title>
    <meta name="theme-color" content="#2E7D32">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Agro Cards">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="topbar" role="banner">
    <div class="wrap">
        <a href="/my_decks.html" class="topbar-back hidden" id="topbar-back" aria-label="Voltar para Meus Cards">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
        <a href="/" class="topbar-brand" aria-label="Agronomia Flashcards – início">
            <svg class="brand-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
                <path d="M12 22V12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M12 13C13 10 16 8 19 8C19 11 16.5 13.5 12 13Z" fill="currentColor"/>
                <path d="M12 17C11 14 8 12 5 12C5 15 7.5 17.5 12 17Z" fill="currentColor" opacity="0.6"/>
                <path d="M9 22Q12 20.5 15 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
            </svg>
            <span class="brand-name">Agronomia<span class="brand-sub"> – Flashcards</span></span>
        </a>
        <div class="topbar-center" aria-hidden="true"></div>
        <div id="topbar-right" class="topbar-right"></div>
    </div>
</header>

<main class="page-main">
    <div class="wrap">
        <div id="spinner" class="spinner" style="margin:3rem auto" role="status" aria-label="Carregando…"></div>
        <div id="access-denied" class="hidden" style="text-align:center;padding:3rem">
            <p>Este deck não foi encontrado ou você não tem permissão para acessá-lo.</p>
            <a href="/classes.html" class="btn btn-primary" style="margin-top:1rem">Voltar</a>
        </div>

        <div id="page-content" class="hidden">

            <!-- Header -->
            <div class="page-header" style="margin-bottom:1.5rem">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap">
                    <div>
                        <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.3rem">
                            <span class="badge" style="background:#E8F5E9;color:#1B5E20;border:1px solid #A5D6A7;font-size:.72rem">
                                🔒 Deck Pessoal
                            </span>
                        </div>
                        <h1 id="deck-title" class="page-title">Meu Deck</h1>
                        <p id="card-count-text" class="page-subtitle">0 card(s)</p>
                    </div>
                    <a id="btn-study" href="#" class="btn btn-primary btn-sm" style="align-self:flex-start">
                        ▶ Estudar
                    </a>
                </div>
            </div>

            <!-- Add card form -->
            <div class="card" style="padding:1.1rem;margin-bottom:1.5rem" id="add-card-section">
                <div class="section-title" style="margin-bottom:.85rem" id="form-title">Adicionar card</div>

                <div class="field" style="margin-bottom:.75rem">
                    <label class="label" for="inp-question">Pergunta</label>
                    <textarea id="inp-question" class="input" rows="3"
                              placeholder="Digite a pergunta…" maxlength="500" data-counter
                              style="resize:vertical;min-height:68px"></textarea>
                </div>
                <div class="field" style="margin-bottom:.75rem">
                    <label class="label" for="inp-answer">Resposta</label>
                    <textarea id="inp-answer" class="input" rows="4"
                              placeholder="Digite a resposta…" maxlength="2000" data-counter
                              style="resize:vertical;min-height:90px"></textarea>
                </div>
                <div class="field" style="margin-bottom:1rem">
                    <label class="label">Tipo</label>
                    <div class="type-picker" role="group" aria-label="Tipo de card" id="type-picker">
                        <label class="type-option" data-type="conceito">
                            <input type="radio" name="my-card-type" value="conceito" checked>
                            <span class="type-option__badge" style="background:var(--type-conceito)">Conceito</span>
                            <span class="type-option__desc">definição / teoria</span>
                        </label>
                        <label class="type-option" data-type="processo">
                            <input type="radio" name="my-card-type" value="processo">
                            <span class="type-option__badge" style="background:var(--type-processo)">Processo</span>
                            <span class="type-option__desc">como fazer</span>
                        </label>
                        <label class="type-option" data-type="aplicacao">
                            <input type="radio" name="my-card-type" value="aplicacao">
                            <span class="type-option__badge" style="background:var(--type-aplicacao)">Aplicação</span>
                            <span class="type-option__desc">uso prático</span>
                        </label>
                        <label class="type-option" data-type="comparacao">
                            <input type="radio" name="my-card-type" value="comparacao">
                            <span class="type-option__badge" style="background:var(--type-comparacao)">Comparação</span>
                            <span class="type-option__desc">semelhanças / diferenças</span>
                        </label>
                    </div>
                </div>

                <div style="display:flex;gap:.5rem;flex-wrap:wrap">
                    <button id="btn-save-card" class="btn btn-primary btn-sm">Salvar card</button>
                    <button id="btn-cancel-edit" class="btn btn-outline btn-sm hidden">Cancelar edição</button>
                </div>
                <p id="form-error" class="hidden" style="color:var(--danger);font-size:.82rem;margin-top:.5rem"></p>
            </div>

            <!-- Card list -->
            <div class="section">
                <div class="section-title">Cards do deck</div>
                <div id="card-list" class="my-card-list">
                    <p class="text-muted" style="padding:.5rem 0">Nenhum card ainda. Adicione o primeiro acima!</p>
                </div>
            </div>

        </div><!-- /page-content -->
    </div>
</main>

<script src="/static/js/app.js"></script>
<script src="/static/js/my_deck.js"></script>
</body>
</html>
