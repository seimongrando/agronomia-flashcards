<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Deck &mdash; FlashCards</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="topbar" role="banner">
    <div class="wrap">
        <a href="/teach.html" class="topbar-back" aria-label="Voltar para Gerenciar Conteúdo">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="2"
                      stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Gerenciar
        </a>
        <div class="topbar-center" id="topbar-deck-name" aria-live="polite"></div>
        <div id="topbar-right" class="topbar-right"></div>
    </div>
</header>

<main class="page-main">
    <div class="wrap" style="max-width:680px">

        <div id="spinner"><div class="spinner"></div></div>

        <div id="deck-content" class="hidden">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem">
                <div>
                    <h2 id="deck-title" style="font-size:1.1rem;font-weight:700"></h2>
                    <span id="deck-subtitle" class="text-muted"></span>
                </div>
                <button id="btn-rename-deck" class="btn btn-outline btn-sm" aria-label="Renomear deck"
                        style="display:flex;align-items:center;gap:.35rem">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Renomear
                </button>
            </div>

            <!-- Inline rename form -->
            <div id="rename-form" class="card hidden" style="padding:.9rem 1rem;margin-bottom:1rem">
                <div class="field">
                    <label for="rename-name">Nome do deck *</label>
                    <input id="rename-name" type="text" class="input" maxlength="80"
                           placeholder="Nome do deck (máx. 80 caracteres)" aria-required="true">
                </div>
                <div class="field">
                    <label for="rename-subject">Matéria (opcional)</label>
                    <input id="rename-subject" type="text" class="input" maxlength="80"
                           placeholder="Ex: Química do Solo, Fitotecnia…"
                           list="rename-subject-suggestions">
                    <datalist id="rename-subject-suggestions"></datalist>
                </div>
                <div class="field">
                    <label for="rename-desc">Descrição (opcional)</label>
                    <input id="rename-desc" type="text" class="input" maxlength="200"
                           placeholder="Breve descrição do conteúdo do deck">
                </div>
                <div id="rename-error" class="alert alert-error hidden" role="alert"></div>
                <div style="display:flex;gap:.5rem;margin-top:.5rem">
                    <button id="btn-rename-save" class="btn btn-primary btn-sm">Salvar</button>
                    <button id="btn-rename-cancel" class="btn btn-outline btn-sm">Cancelar</button>
                </div>
            </div>

            <div class="search-row">
                <input id="search-input" type="search" class="input" placeholder="Buscar por pergunta ou resposta…">
            </div>

            <div id="card-list" class="card-list"></div>
            <div id="empty-cards" class="empty-state hidden">
                <h2>Nenhum card</h2>
                <p>Adicione cards via upload CSV ou manualmente em <a href="/teach.html">Conteúdo</a>.</p>
            </div>
            <div id="pagination" class="pagination"></div>
        </div>

    </div>
</main>

<!-- Edit modal -->
<div id="edit-modal" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Editar card</span>
            <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body">
            <div class="field">
                <label>Tipo</label>
                <div class="type-picker" role="group" aria-label="Tipo de card" id="edit-type-picker">
                    <label class="type-option" data-type="conceito">
                        <input type="radio" name="edit-type" value="conceito" checked>
                        <span class="type-option__badge" style="background:var(--type-conceito)">Conceito</span>
                        <span class="type-option__desc">definição / teoria</span>
                    </label>
                    <label class="type-option" data-type="processo">
                        <input type="radio" name="edit-type" value="processo">
                        <span class="type-option__badge" style="background:var(--type-processo)">Processo</span>
                        <span class="type-option__desc">como fazer</span>
                    </label>
                    <label class="type-option" data-type="aplicacao">
                        <input type="radio" name="edit-type" value="aplicacao">
                        <span class="type-option__badge" style="background:var(--type-aplicacao)">Aplica&ccedil;&atilde;o</span>
                        <span class="type-option__desc">uso pr&aacute;tico</span>
                    </label>
                    <label class="type-option" data-type="comparacao">
                        <input type="radio" name="edit-type" value="comparacao">
                        <span class="type-option__badge" style="background:var(--type-comparacao)">Compara&ccedil;&atilde;o</span>
                        <span class="type-option__desc">semelhan&ccedil;as / diferen&ccedil;as</span>
                    </label>
                </div>
            </div>
            <div class="field">
                <label>Pergunta *</label>
                <textarea id="edit-question" class="textarea" maxlength="2000" rows="3"></textarea>
            </div>
            <div class="field">
                <label>Resposta *</label>
                <textarea id="edit-answer" class="textarea" maxlength="5000" rows="4"></textarea>
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Tópico</label>
                    <input id="edit-topic" type="text" class="input" maxlength="200">
                </div>
                <div class="field">
                    <label>Fonte</label>
                    <input id="edit-source" type="text" class="input" maxlength="500">
                </div>
            </div>
            <div id="edit-error" class="alert alert-error hidden"></div>
        </div>
        <div class="modal-footer">
            <button id="btn-delete-card" class="btn btn-danger-outline btn-sm">Excluir</button>
            <button id="btn-modal-cancel" class="btn btn-outline">Cancelar</button>
            <button id="btn-modal-save" class="btn btn-primary">Salvar</button>
        </div>
    </div>
</div>

<script src="/static/js/app.js"></script>
<script src="/static/js/deck_manage.js"></script>
</body>
</html>
