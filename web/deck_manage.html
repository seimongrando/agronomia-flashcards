<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Deck &mdash; FlashCards</title>
    <meta name="theme-color" content="#2E7D32">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Agro Cards">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="topbar" role="banner">
    <div class="wrap">
        <a href="/teach.html" class="topbar-back" aria-label="Voltar para Gerenciar Conteúdo">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="2"
                      stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Gerenciar
        </a>
        <div class="topbar-center" id="topbar-deck-name" aria-live="polite"></div>
        <div id="topbar-right" class="topbar-right"></div>
    </div>
</header>

<main class="page-main">
    <div class="wrap" style="max-width:680px">

        <div id="spinner"><div class="spinner" role="status" aria-label="Carregando…"></div></div>

        <div id="deck-content" class="hidden">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem">
                <div>
                    <h2 id="deck-title" style="font-size:1.1rem;font-weight:700"></h2>
                    <span id="deck-subtitle" class="text-muted"></span>
                </div>
                <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
                    <span id="deck-status-badge"></span>
                    <button id="btn-publish-deck" class="btn btn-sm" style="display:none;align-items:center;gap:.35rem" aria-label="Publicar ou despublicar deck"></button>
                    <a id="btn-export-csv" href="#" download class="btn btn-outline btn-sm"
                       aria-label="Exportar cards como CSV"
                       style="display:flex;align-items:center;gap:.3rem">
                        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                            <path d="M8 2v8M5 7l3 3 3-3M3 13h10" stroke="currentColor"
                                  stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        CSV
                    </a>
                    <button id="btn-rename-deck" class="btn btn-outline btn-sm" aria-label="Editar deck"
                            style="display:flex;align-items:center;gap:.35rem">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Editar
                    </button>
                </div>
            </div>

            <!-- Inline edit form -->
            <div id="rename-form" class="card hidden" style="padding:.9rem 1rem;margin-bottom:1rem">
                <div class="field-row mt-1" style="flex-wrap:wrap">
                    <div class="field" style="flex:2;min-width:160px">
                        <label for="rename-name">Nome do deck *</label>
                        <input id="rename-name" type="text" class="input" maxlength="80"
                               placeholder="Nome do deck" data-counter aria-required="true">
                    </div>
                    <div class="field" style="flex:1;min-width:140px">
                        <label for="rename-subject">Matéria (opcional)</label>
                        <input id="rename-subject" type="text" class="input" maxlength="80"
                               placeholder="Ex: Fitotecnia" data-counter
                               list="rename-subject-suggestions">
                        <datalist id="rename-subject-suggestions"></datalist>
                    </div>
                </div>
                <div class="field">
                    <label for="rename-desc">Descrição (opcional)</label>
                    <input id="rename-desc" type="text" class="input" maxlength="200"
                           placeholder="Breve descrição do conteúdo do deck" data-counter>
                </div>

                <!-- Status & expiration -->
                <div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;margin-top:.25rem">
                    <label class="toggle-label" style="display:flex;align-items:center;gap:.5rem;cursor:pointer;user-select:none">
                        <input id="rename-active" type="checkbox" class="toggle-input" checked aria-label="Deck ativo">
                        <span class="toggle-track" aria-hidden="true"></span>
                        <span id="toggle-active-lbl">Deck ativo</span>
                    </label>
                    <div class="field" style="margin:0;flex:1;min-width:180px">
                        <label for="rename-expires" style="font-size:.82rem">Expira em (opcional)</label>
                        <input id="rename-expires" type="datetime-local" class="input input-sm"
                               title="Deixe em branco para não expirar automaticamente">
                    </div>
                    <button id="btn-clear-expiry" class="btn btn-outline btn-sm" type="button"
                            style="align-self:flex-end" title="Remover data de expiração">
                        Remover expiração
                    </button>
                </div>

                <div id="rename-error" class="alert alert-error hidden" role="alert"></div>
                <div style="display:flex;gap:.5rem;margin-top:.75rem">
                    <button id="btn-rename-save" class="btn btn-primary btn-sm">Salvar</button>
                    <button id="btn-rename-cancel" class="btn btn-outline btn-sm">Cancelar</button>
                </div>
            </div>

            <div class="search-row" style="display:flex;gap:.5rem;align-items:center">
                <input id="search-input" type="search" class="input" placeholder="Buscar por pergunta ou resposta…" style="flex:1">
                <button id="btn-select-mode" class="btn btn-outline btn-sm" aria-label="Selecionar cards para excluir" title="Selecionar cards">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <rect x="3" y="5" width="4" height="4" rx="1" stroke="currentColor" stroke-width="2"/>
                        <rect x="3" y="12" width="4" height="4" rx="1" stroke="currentColor" stroke-width="2"/>
                        <path d="M10 7h11M10 14h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Selecionar
                </button>
            </div>

            <div id="card-list" class="card-list"></div>
            <div id="empty-cards" class="empty-state hidden">
                <h2>Nenhum card</h2>
                <p>Adicione cards via upload CSV ou manualmente em <a href="/teach.html">Conteúdo</a>.</p>
                <!-- Delete zone — only shown when deck is empty -->
                <div id="delete-zone" class="hidden" style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)">
                    <p style="font-size:.85rem;color:var(--text-secondary);margin-bottom:.75rem">
                        Este deck não tem cards. Você pode removê-lo permanentemente.
                    </p>
                    <button id="btn-delete-deck" class="btn btn-sm"
                            style="background:#FEF2F2;color:#B91C1C;border:1px solid #FCA5A5"
                            aria-label="Excluir deck">
                        Excluir deck
                    </button>
                </div>
            </div>
            <div id="pagination" class="pagination"></div>
        </div>

    </div>
</main>

<!-- Bulk action bar — visible only in selection mode -->
<div id="bulk-bar" class="bulk-action-bar hidden" role="toolbar" aria-label="Ações em lote">
    <div class="bulk-left">
        <label class="bulk-select-all" for="chk-select-all">
            <input type="checkbox" id="chk-select-all" aria-label="Selecionar todos os cards">
            <span>Selecionar todos</span>
        </label>
        <span id="bulk-count" class="bulk-count-badge">0 selecionados</span>
    </div>
    <div class="bulk-actions">
        <button id="btn-bulk-delete" class="btn btn-sm bulk-delete-btn" disabled aria-label="Excluir cards selecionados">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Excluir selecionados
        </button>
        <button id="btn-bulk-cancel" class="btn btn-sm btn-outline">Cancelar</button>
    </div>
</div>

<!-- Edit modal -->
<div id="edit-modal" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Editar card</span>
            <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body">
            <div class="field">
                <label>Tipo</label>
                <div class="type-picker" role="group" aria-label="Tipo de card" id="edit-type-picker">
                    <label class="type-option" data-type="conceito">
                        <input type="radio" name="edit-type" value="conceito" checked>
                        <span class="type-option__badge" style="background:var(--type-conceito)">Conceito</span>
                        <span class="type-option__desc">definição / teoria</span>
                    </label>
                    <label class="type-option" data-type="processo">
                        <input type="radio" name="edit-type" value="processo">
                        <span class="type-option__badge" style="background:var(--type-processo)">Processo</span>
                        <span class="type-option__desc">como fazer</span>
                    </label>
                    <label class="type-option" data-type="aplicacao">
                        <input type="radio" name="edit-type" value="aplicacao">
                        <span class="type-option__badge" style="background:var(--type-aplicacao)">Aplica&ccedil;&atilde;o</span>
                        <span class="type-option__desc">uso pr&aacute;tico</span>
                    </label>
                    <label class="type-option" data-type="comparacao">
                        <input type="radio" name="edit-type" value="comparacao">
                        <span class="type-option__badge" style="background:var(--type-comparacao)">Compara&ccedil;&atilde;o</span>
                        <span class="type-option__desc">semelhan&ccedil;as / diferen&ccedil;as</span>
                    </label>
                </div>
            </div>
            <div class="field">
                <label>Pergunta *</label>
                <textarea id="edit-question" class="textarea" maxlength="500" rows="3" data-counter></textarea>
            </div>
            <div class="field">
                <label>Resposta *</label>
                <textarea id="edit-answer" class="textarea" maxlength="2000" rows="4" data-counter></textarea>
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Tópico</label>
                    <input id="edit-topic" type="text" class="input" maxlength="80" data-counter>
                </div>
                <div class="field">
                    <label>Fonte</label>
                    <input id="edit-source" type="text" class="input" maxlength="120" data-counter>
                </div>
            </div>
            <div id="edit-error" class="alert alert-error hidden"></div>
        </div>
        <div class="modal-footer">
            <button id="btn-delete-card" class="btn btn-danger-outline btn-sm">Excluir</button>
            <button id="btn-modal-cancel" class="btn btn-outline">Cancelar</button>
            <button id="btn-modal-save" class="btn btn-primary">Salvar</button>
        </div>
    </div>
</div>

<script src="/static/js/app.js"></script>
<script src="/static/js/deck_manage.js"></script>
</body>
</html>
