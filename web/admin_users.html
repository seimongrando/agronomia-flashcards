<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários &mdash; FlashCards Admin</title>
    <meta name="theme-color" content="#2E7D32">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Agro Cards">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="topbar" role="banner">
    <div class="wrap">
        <a href="/" class="topbar-brand" aria-label="Agronomia Flashcards – início">
            <svg class="brand-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
                <path d="M12 22V12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M12 13C13 10 16 8 19 8C19 11 16.5 13.5 12 13Z" fill="currentColor"/>
                <path d="M12 17C11 14 8 12 5 12C5 15 7.5 17.5 12 17Z" fill="currentColor" opacity="0.6"/>
                <path d="M9 22Q12 20.5 15 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
            </svg>
            <span class="brand-name">Agronomia<span class="brand-sub"> – Flashcards</span></span>
        </a>
        <div class="topbar-center" aria-hidden="true"></div>
        <div id="topbar-right" class="topbar-right"></div>
    </div>
</header>

<main class="page-main">
    <div class="wrap" style="max-width:640px">

        <div id="spinner"><div class="spinner" role="status" aria-label="Carregando…"></div></div>
        <div id="access-denied" class="empty-state hidden">
            <h2>Acesso negado</h2>
            <p>Esta área é restrita a administradores.</p>
        </div>

        <div id="admin-content" class="hidden">
            <div class="page-header">
                <h1 class="page-title">Gerenciar Usuários</h1>
            </div>

            <div class="search-row">
                <input id="search-input" type="search" class="input" placeholder="Buscar por e-mail…">
                <button id="btn-search" class="btn btn-outline btn-sm">Buscar</button>
            </div>

            <div id="spinner-search" class="hidden"><div class="spinner" style="width:24px;height:24px;margin:.5rem 0"></div></div>
            <div id="user-list" class="user-list"></div>
            <div id="empty-users" class="empty-state hidden">
                <h2>Nenhum usuário encontrado</h2>
            </div>
        </div>

    </div>
</main>

<script src="/static/js/app.js"></script>
<script src="/static/js/admin_users.js"></script>
</body>
</html>
