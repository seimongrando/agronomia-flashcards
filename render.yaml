services:
  - type: web
    name: agronomia-flashcards
    runtime: go
    plan: starter
    buildCommand: go build -o server ./cmd/server
    startCommand: ./server
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: agronomia-flashcards-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info

      # Set these manually in the Render dashboard (never commit values):
      - key: JWT_SECRET
        sync: false          # generate with: openssl rand -base64 48
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URL
        sync: false          # e.g. https://agronomia-flashcards.onrender.com/auth/google/callback
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://agronomia-flashcards.onrender.com
      - key: ADMIN_EMAILS
        sync: false          # comma-separated list of Google account emails

databases:
  - name: agronomia-flashcards-db
    plan: free
    databaseName: agronomia_flashcards
